name: Autofix (fmt + clippy + Hessian Table I)

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  autofix:
    name: Apply formatting, clippy fixes, and refresh Table I
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo fmt (auto-fix)
        run: cargo fmt --all

      - name: Run cargo clippy --fix (auto-fix what's possible)
        run: cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features
        env:
          RUSTFLAGS: ""

      - name: Update README Hessian Table I (auto-fix)
        run: UPDATE_README=1 cargo test --lib readme_table_i_is_up_to_date

      - name: Commit and push fixes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -u
            git commit -m "autofix: cargo fmt, clippy --fix, README Table I"
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No autofixes needed."
          fi

      - name: Check for remaining clippy warnings (unfixable)
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          RUSTFLAGS: -D warnings